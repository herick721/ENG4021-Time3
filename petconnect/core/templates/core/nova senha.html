<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Petconnect — Nova Senha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0d9488;
    --teal-dark: #0f766e;
    --teal-light: #ccfbf1;
    --teal-soft: #ecfdf5;
    --orange: #f59e0b;
    --beige: #fef3e2;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --green-soft: #d1fae5;
    --error: #ef4444;
    --error-soft: #fee2e2;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, var(--teal-soft) 0%, var(--beige) 100%);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-light);
    padding: 18px 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo {
    font-size: 24px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }
  .logo .pet { color: var(--teal); }
  .logo .nect { color: var(--orange); }

  .container {
    max-width: 460px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  .intro {
    text-align: center;
    margin-bottom: 32px;
  }
  .intro-icon {
    width: 72px;
    height: 72px;
    background: var(--teal-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
  }
  .intro h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .intro p { color: var(--text-muted); font-size: 15px; }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 4px 24px rgba(15,118,110,0.06);
    border: 1px solid rgba(15,118,110,0.08);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
  }
  .field label { font-size: 13px; font-weight: 600; }
  .input-wrap { position: relative; }
  .input-wrap .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    pointer-events: none;
  }
  .input-wrap input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-light);
  }

  /* Barra de força da senha */
  .strength-bar {
    margin-top: 8px;
    margin-bottom: 4px;
  }
  .strength-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .strength-fill {
    height: 100%;
    width: 60%;
    background: var(--orange);
    border-radius: 2px;
    transition: width .3s, background .3s;
  }
  .strength-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  /* Requisitos */
  .requirements {
    background: var(--bg);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .req-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .req-icon { font-size: 14px; }
  .req-item.ok { color: var(--teal-dark); }
  .req-item.ok .req-icon::before { content: "✓"; color: var(--teal); }
  .req-item:not(.ok) .req-icon::before { content: "○"; color: var(--text-light); }

  .btn-submit {
    width: 100%;
    background: var(--teal);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    transition: background .2s;
  }
  .btn-submit:hover { background: var(--teal-dark); }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--text-muted);
    text-decoration: none;
  }
  .back-link span { color: var(--teal); font-weight: 600; }
  .back-link:hover span { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="pet">Pet</span><span>🐾</span><span class="nect">nect</span>
  </a>
</header>

<div class="container">
  <div class="intro">
    <div class="intro-icon">🔒</div>
    <h1>Criar nova senha</h1>
    <p>Escolha uma senha forte para proteger sua conta no Petconnect.</p>
  </div>

  <div class="card">
    <form>
      <div class="field">
        <label for="senha">Nova senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="senha" placeholder="Mínimo 8 caracteres" />
        </div>
        <div class="strength-bar">
          <div class="strength-track"><div class="strength-fill"></div></div>
          <span class="strength-label">Força: Média</span>
        </div>
      </div>

      <div class="field">
        <label for="confirmar">Confirmar nova senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirmar" placeholder="Repita a senha" />
        </div>
      </div>

      <div class="requirements">
        <div class="req-item ok"><span class="req-icon"></span> Mínimo 8 caracteres</div>
        <div class="req-item ok"><span class="req-icon"></span> Letras maiúsculas e minúsculas</div>
        <div class="req-item"><span class="req-icon"></span> Pelo menos um número</div>
        <div class="req-item"><span class="req-icon"></span> Pelo menos um caractere especial</div>
      </div>

      <button type="submit" class="btn-submit">Salvar nova senha</button>
    </form>
  </div>

  <a href="login.html" class="back-link">Lembrou a senha? <span>Entrar</span></a>
</div>

</body>
</html>
