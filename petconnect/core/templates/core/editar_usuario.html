
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PetConect — Editar Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0d9488;
    --teal-dark: #0f766e;
    --teal-light: #ccfbf1;
    --orange: #f59e0b;
    --orange-dark: #d97706;
    --gray-700: #4A4840;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAVBAR PADRÃO INDEX/CADASTRO ── */
  .navbar {
    background: var(--card);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 6px; /* Espaçamento conforme cadastro.html */
    text-decoration: none;
    font-weight: 800; /* Extra Bold */
    font-size: 24px;   /* Tamanho conforme cadastro.html */
  }

  .logo .pet { color: var(--teal); }
  .logo .paw { color: var(--gray-700); margin: 0 2px; }
  .logo .nect { color: var(--orange); }

  /* ── CONTAINER CENTRAL ── */
  .main-content {
    display: flex;
    justify-content: center;
    padding: 60px 20px;
  }

  .edit-container {
    background: var(--card);
    width: 100%;
    max-width: 500px;
    padding: 32px;
    border-radius: 24px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    border: 1px solid var(--border);
  }

  .header {
    margin-bottom: 32px;
    text-align: center;
  }

  .header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--teal-dark);
    margin-bottom: 8px;
  }

  .header p {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 1rem;
    transition: all 0.2s;
  }

  input:focus {
    outline: none;
    border-color: var(--teal);
    box-shadow: 0 0 0 4px var(--teal-light);
  }

  .btn-save {
    width: 100%;
    background-color: var(--teal);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 10px;
  }

  .btn-save:hover {
    background-color: var(--teal-dark);
  }

  .btn-cancel {
    display: block;
    text-align: center;
    width: 100%;
    color: var(--text-muted);
    padding: 12px;
    font-size: 0.9rem;
    text-decoration: none;
    margin-top: 8px;
    font-weight: 500;
  }

  .profile-pic-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }

  .avatar-placeholder {
    width: 80px;
    height: 80px;
    background: var(--teal-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin-bottom: 12px;
    border: 3px solid #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .change-pic-link {
    font-size: 0.8rem;
    color: var(--teal);
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>

<nav class="navbar">
  <a href="{% url 'index' %}" class="logo">
    <span class="pet">Pet</span><span class="paw">🐾</span><span class="nect">nect</span>
  </a>
</nav>

<div class="main-content">
  <div class="edit-container">
    <div class="header">
      <h1>Editar Perfil</h1>
      <p>Atualize suas informações no PetConect</p>
    </div>

    <div class="profile-pic-section">
      <div class="avatar-placeholder">👤</div>
      <a href="#" class="change-pic-link">Alterar foto de perfil</a>
    </div>

    <form id="editForm" method="POST" action="">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Nome Completo</label>
        <input type="text" id="name" value="{{ usuario.get_full_name|default:usuario.username }}" placeholder="Seu nome">
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" value="{{ usuario.email }}" placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="phone">Telefone</label>
        <input type="tel" id="phone" value="{{ usuario.telefone|default:'' }}" placeholder="(00) 00000-0000">
      </div>

      <div class="form-group">
        <label for="location">Cidade / Estado</label>
        <input type="text" id="location" value="{{ usuario.cidade|default:'' }}, {{ usuario.estado|default:'' }}" placeholder="Ex: São Paulo, SP">
      </div>

      <button type="submit" class="btn-save">Salvar Alterações</button>
      <a href="{% url 'painel_adotante' %}" class="btn-cancel">Cancelar e Voltar</a>
    </form>
  </div>
</div>

</body>
</html>
