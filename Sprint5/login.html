<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Petconnect — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0d9488;
    --teal-dark: #0f766e;
    --teal-light: #ccfbf1;
    --teal-soft: #ecfdf5;
    --orange: #f59e0b;
    --orange-dark: #d97706;
    --beige: #fef3e2;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --error: #ef4444;
  }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--teal-soft) 0%, var(--beige) 100%);
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  header {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-light);
    padding: 18px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo {
    font-size: 24px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }
  .logo .pet { color: var(--teal); }
  .logo .nect { color: var(--orange); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 14px;
  }
  .header-right span { color: var(--text-muted); }
  .header-right a {
    color: var(--teal);
    font-weight: 600;
    text-decoration: none;
  }
  .header-right a:hover { text-decoration: underline; }

  .container {
    max-width: 460px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  .intro {
    text-align: center;
    margin-bottom: 32px;
  }
  .intro h1 {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .intro h1 .accent { color: var(--teal); }
  .intro p {
    color: var(--text-muted);
    font-size: 15px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 4px 24px rgba(15, 118, 110, 0.06);
    border: 1px solid rgba(15, 118, 110, 0.08);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
  }
  .field label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    pointer-events: none;
  }
  .input-wrap input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .input-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-light);
  }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .remember-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
  }
  .remember-label input[type="checkbox"] {
    accent-color: var(--teal);
    width: 15px;
    height: 15px;
  }
  .forgot-link {
    font-size: 13px;
    font-weight: 600;
    color: var(--teal);
    text-decoration: none;
  }
  .forgot-link:hover { text-decoration: underline; }

  .btn-submit {
    width: 100%;
    background: var(--teal);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    transition: background .2s;
    margin-bottom: 14px;
  }
  .btn-submit:hover { background: var(--teal-dark); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 500;
    white-space: nowrap;
  }

  .btn-google {
    width: 100%;
    background: #fff;
    color: var(--text);
    border: 1.5px solid var(--border);
    padding: 13px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color .2s, background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-google:hover { border-color: var(--teal); background: var(--teal-soft); }

  .signup-link {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .signup-link a {
    color: var(--teal);
    font-weight: 600;
    text-decoration: none;
  }
  .signup-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="pet">Pet</span>
    <span>🐾</span>
    <span class="nect">nect</span>
  </a>
  <div class="header-right">
    <span>Não tem conta?</span>
    <a href="cadastro.html">Cadastrar-se</a>
  </div>
</header>

<div class="container">
  <div class="intro">
    <h1>Bem-vindo de <span class="accent">volta</span> 🐾</h1>
    <p>Entre na sua conta para continuar sua jornada de adoção.</p>
  </div>

  <div class="card">
    <form>
      <div class="field">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="seu@email.com" />
        </div>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="senha" placeholder="Sua senha" />
        </div>
      </div>

      <div class="field-row">
        <label class="remember-label">
          <input type="checkbox" /> Lembrar de mim
        </label>
        <a href="#" class="forgot-link">Esqueci minha senha</a>
      </div>

      <button type="submit" class="btn-submit">Entrar</button>

      <div class="divider"><span>ou continue com</span></div>

      <button type="button" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Entrar com Google
      </button>
    </form>
  </div>

  <p class="signup-link">Não tem uma conta? <a href="cadastro.html">Cadastre-se grátis</a></p>
</div>

</body>
</html>
